<!DOCTYPE html>
<html>
  <head>
    <title>Peta CCTV</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
      body { margin:0; font-family: Arial; }
      #map { height: 100vh; }

      .leaflet-control-zoom { display: none !important; }
	  .leaflet-control-layers { display: none !important; }

      .custom-zoom {
        position: absolute;
        top: 10px;
        left: 10px;
        display: flex;
        flex-direction: column;
        gap: 5px;
        z-index: 1000;
      }

      .custom-zoom button {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: none;
        background: white;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        cursor: pointer;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.5s ease;
      }

      .custom-zoom button:hover {
        background: #f0f0f0;
        transform: scale(1.1);
      }

      .leaflet-popup-content-wrapper {
        background-color: transparent !important;
        padding: 0 !important;
        border: none !important;
      }

      .leaflet-popup-tip {
        background-color: yellow !important;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <div class="custom-zoom">
	  <button id="switch-layer">🗺️</button>
      <button id="zoom-in">+</button>
      <button id="zoom-out">−</button>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
      var map = L.map('map').setView([-7.9, 112.9], 10);

      var GoogleSatelit = L.tileLayer(
        'https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
        { subdomains:['mt0','mt1','mt2','mt3'], maxZoom: 20 }
      );

      var EsriSatelit = L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20}
      );

      var EsriLabel = L.tileLayer(
        'https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20}
      );

      map.on('baselayerchange', function(e) {
        if (e.name === "🛰️ Esri Satelit") {
          map.addLayer(EsriLabel);
        } else {
          map.removeLayer(EsriLabel);
        }
      });

      var OpenStreetMap = L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 20 }
      );

      L.control.layers({
        "🛰️ Google Satelit": GoogleSatelit,
        "🛰️ Esri Satelit": EsriSatelit,
        "🗺️ OpenStreetMap": OpenStreetMap
      }).addTo(map);

      GoogleSatelit.addTo(map);

      document.getElementById('zoom-in').onclick = function() { map.zoomIn(); };
      document.getElementById('zoom-out').onclick = function() { map.zoomOut(); };

      var baseLayers = {
        "Google Satelit": GoogleSatelit,
        "Esri Satelit": EsriSatelit,
        "OpenStreetMap": OpenStreetMap
      };

      var currentLayer = GoogleSatelit;

      document.getElementById("switch-layer").onclick = function() {
        if (currentLayer === GoogleSatelit) {
          map.removeLayer(GoogleSatelit);
          map.addLayer(EsriSatelit);
          currentLayer = EsriSatelit;
        } else if (currentLayer === EsriSatelit) {
          map.removeLayer(EsriSatelit);
          map.addLayer(OpenStreetMap);
          currentLayer = OpenStreetMap;
        } else {
          map.removeLayer(OpenStreetMap);
          map.addLayer(GoogleSatelit);
          currentLayer = GoogleSatelit;
        }
      };

      var ListCCTV = [
        { nama: "Purwodadi Arah Malang", lat: -7.9, lng: 112.9, url: "https://dishub.pasuruankab.go.id:5444/LiveApp/streams/PWD_MLG.m3u8" },
        { nama: "Purwodadi Arah Surabaya", lat: -7.8, lng: 112.8, url: "https://dishub.pasuruankab.go.id:5444/LiveApp/streams/PWD_SBY.m3u8" },
        { nama: "Purwodadi Arah 1", lat: -7.7, lng: 112.7, url: "https://dishub.pasuruankab.go.id:5444/LiveApp/streams/PWD_SBY1.m3u8" }
      ];

      var IkonOnline = L.icon({
        iconUrl: "ikon_status_online.png",
        iconSize: [40, 40],
        iconAnchor: [20, 40],
        popupAnchor: [0, -40]
      });

      var IkonOffline = L.icon({
        iconUrl: "ikon_status_offline.png",
        iconSize: [40, 40],
        iconAnchor: [20, 40],
        popupAnchor: [0, -40]
      });

      function cekStatusCCTV(cctv, marker) {
        if (Hls.isSupported()) {
          var hls = new Hls();
          hls.loadSource(cctv.url);
          hls.on(Hls.Events.MANIFEST_PARSED, function() { marker.setIcon(IkonOnline); hls.destroy(); });
          hls.on(Hls.Events.ERROR, function() { marker.setIcon(IkonOffline); hls.destroy(); });
        } else {
          var video = document.createElement("video");
          video.src = cctv.url;
          video.onloadeddata = function() { marker.setIcon(IkonOnline); };
          video.onerror = function() { marker.setIcon(IkonOffline); };
        }
      }

      var markers = [];

      ListCCTV.forEach(function(cctv, index) {
        var marker = L.marker([cctv.lat, cctv.lng], { icon: IkonOffline }).addTo(map);
        markers.push({ data: cctv, marker: marker });
        var videoId = "video" + index;

        marker.bindPopup(
		  `<div style="width:500px; padding:0; background:transparent;">
		    <div style="
			  width:100%;
			  background-color:red;
			  color:white;
			  padding:1px;
			  text-align:left;
			  line-height:1;
			  font-size:14px;
			">
              <b>${cctv.nama}</b><br>
			</div>
            <video id="${videoId}" width="100%" controls autoplay style="display:block; background:transparent;"></video>
		  </div>`,
          { maxWidth: 900 }
        );

        marker.on('click', function() {
          setTimeout(function() {
            var video = document.getElementById(videoId);
            if (Hls.isSupported()) {
              var hls = new Hls();
              hls.loadSource(cctv.url);
              hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
              video.src = cctv.url;
            }
          }, 500);
        });
      });

      markers.forEach(function(item) { cekStatusCCTV(item.data, item.marker); });

      setInterval(function() {
        markers.forEach(function(item) { cekStatusCCTV(item.data, item.marker); });
      }, 60000);

    </script>
  </body>
</html>
