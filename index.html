<!DOCTYPE html>
<html>
  <head>
    <title>Peta CCTV</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
      body { margin:0; font-family: Arial; }
      #map { height: 100vh; }

	  .leaflet-control-layers { display: none !important; }
      .leaflet-control-zoom { display: none !important; }

      .leaflet-popup-content {
        margin: 0 !important;
      }

      .leaflet-popup-content-wrapper {
        padding: 0 !important;
        border: none !important;
        background-color: transparent !important;
      }

      .leaflet-popup-tip {
        background-color: lime !important;
      }

      .Tombol_Kiri_Atas {
        top: 10px;
        left: 10px;
        gap: 5px;
        display: flex;
        flex-direction: column;
        position: absolute;
        z-index: 1000;
      }

      .Tombol_Kiri_Atas button {
        font-size: 20px;
        width: 40px;
        height: 40px;
        border: none;
        border-radius: 50%;
        background: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.5s ease;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      }

      .Tombol_Kiri_Atas button:hover {
        background: #f0f0f0;
        transform: scale(1.1);
      }

      .PopUp_Video {
        width: 350px;
        background: transparent;
      }

      .PopUp_Judul {
        background: lime;
        color: black;
        font-size: 12px;
        padding: 4px;
      }

      video {
        width: 100%;
		object-fit: cover;
      }
    </style>
  </head>

  <body>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <div id="map"></div>

    <div class="Tombol_Kiri_Atas">
	  <button id="Ganti_Peta">🗺️</button>
      <button id="Zoom_In">+</button>
      <button id="Zoom_Out">−</button>
    </div>

    <script>
      var Daftar_CCTV = [
        { nama: "Purwodadi Arah Malang", lat: -7.8020282, lng: 112.7342435, url: "https://dishub.pasuruankab.go.id:5444/LiveApp/streams/PWD_MLG.m3u8" },
        { nama: "Purwodadi Arah Surabaya", lat: -7.8019527, lng: 112.7342936, url: "https://dishub.pasuruankab.go.id:5444/LiveApp/streams/PWD_SBY.m3u8" },
        { nama: "Patung Sapi", lat: -7.6441809, lng: 112.6896415, url: "https://dishub.pasuruankab.go.id:5444/LiveApp/streams/PATUNGSAPI.m3u8" }
      ];

      var Google_Satelit = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'], maxZoom: 20 });
      var Esri_Satelit = L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20});
      var Esri_Jalan = L.tileLayer('https://services.arcgisonline.com/arcgis/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20});
      var Esri_Nama = L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20});
      var OpenStreetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 20 });

      var map = L.map('map').setView([-7.7909025, 112.730651], 10);
      var Peta_Aktif = Google_Satelit;
      var Semua_Lokasi_CCTV = [];

      var Gambar_Ikon_Loading = L.icon({
        iconUrl: "Ikon_Status_Loading.png",
        iconSize: [20, 20],
        iconAnchor: [10, 20],
        popupAnchor: [0, -20]
      });

      var Gambar_Ikon_Offline = L.icon({
        iconUrl: "Ikon_Status_Offline.png",
        iconSize: [20, 20],
        iconAnchor: [10, 20],
        popupAnchor: [0, -20]
      });

      var Gambar_Ikon_Online = L.icon({
        iconUrl: "Ikon_Status_Online.png",
        iconSize: [20, 20],
        iconAnchor: [10, 20],
        popupAnchor: [0, -20]
      });

      Google_Satelit.addTo(map);

      document.getElementById("Ganti_Peta").onclick = function() {
        if (Peta_Aktif === Google_Satelit) {
          map.removeLayer(Google_Satelit);
          map.addLayer(Esri_Satelit);
          map.addLayer(Esri_Jalan);
          map.addLayer(Esri_Nama);
          Peta_Aktif = Esri_Satelit;
        } else if (Peta_Aktif === Esri_Satelit) {
          map.removeLayer(Esri_Satelit);
          map.removeLayer(Esri_Jalan);
          map.removeLayer(Esri_Nama);
          map.addLayer(OpenStreetMap);
          Peta_Aktif = OpenStreetMap;
        } else {
          map.removeLayer(OpenStreetMap);
          map.addLayer(Google_Satelit);
          Peta_Aktif = Google_Satelit;
        }
      };

      document.getElementById('Zoom_In').onclick = function() { map.zoomIn(); };
      document.getElementById('Zoom_Out').onclick = function() { map.zoomOut(); };

      Daftar_CCTV.forEach(function(cctv, index) {
        var marker = L.marker([cctv.lat, cctv.lng], { icon: Gambar_Ikon_Loading }).addTo(map);
        Semua_Lokasi_CCTV.push({ data: cctv, marker: marker });
        var Video_Id = "video" + index;

        marker.bindPopup(`
          <div class="PopUp_Video">
            <div class="PopUp_Judul"><b>${cctv.nama}</b></div>
            <video id="${Video_Id}" controls autoplay></video>
          </div>
        `, { maxWidth: 350 });

        marker.on('click', function() {
          setTimeout(function() {
            var video = document.getElementById(Video_Id);
            if (Hls.isSupported()) {
              var hls = new Hls();
              hls.loadSource(cctv.url);
              hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
              video.src = cctv.url;
            }
          }, 500);
        });
      });

      function Cek_Status_CCTV(cctv, marker) {
        marker.setIcon(Gambar_Ikon_Loading);

        fetch(cctv.url, {
          method: 'GET',
          headers: { 'Range': 'bytes=0-100' },
          cache: 'no-store'
        })

        .then(response => {
          if (response.ok) {
            marker.setIcon(Gambar_Ikon_Online);
          } else {
            marker.setIcon(Gambar_Ikon_Offline);
          }
        })

        .catch(() => {
          marker.setIcon(Gambar_Ikon_Offline);
        });
      }

      Semua_Lokasi_CCTV.forEach(item => Cek_Status_CCTV(item.data, item.marker));

      setInterval(function() {
        Semua_Lokasi_CCTV.forEach(item => Cek_Status_CCTV(item.data, item.marker));
      }, (60000 * 5));
    </script>
  </body>
</html>
